<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Login — APTIORA</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap');
*{margin:0;padding:0;box-sizing:border-box;}
body{
  font-family:'Poppins',sans-serif;min-height:100vh;
  display:flex;justify-content:center;align-items:center;
  background:linear-gradient(-45deg,#667eea,#764ba2,#6366f1,#2193b0);
  background-size:400% 400%;animation:bg 8s ease infinite;overflow:hidden;
}
@keyframes bg{0%{background-position:0% 50%;}50%{background-position:100% 50%;}100%{background-position:0% 50%;}}
canvas{position:fixed;inset:0;z-index:1;pointer-events:none;}
.card{
  position:relative;z-index:10;
  background:rgba(255,255,255,0.13);backdrop-filter:blur(18px);
  border-radius:24px;padding:36px 32px;width:360px;
  color:white;box-shadow:0 20px 60px rgba(0,0,0,0.25);
  border:1px solid rgba(255,255,255,0.2);animation:up 0.7s ease;
}
@keyframes up{from{opacity:0;transform:translateY(28px);}to{opacity:1;transform:translateY(0);}}
.logo{font-size:26px;font-weight:800;letter-spacing:2px;text-align:center;margin-bottom:4px;
  background:linear-gradient(135deg,#fff,#a5b4fc);-webkit-background-clip:text;-webkit-text-fill-color:transparent;}
.subtitle{text-align:center;font-size:12px;color:rgba(255,255,255,0.55);margin-bottom:22px;}
.tabs{display:flex;background:rgba(0,0,0,0.2);border-radius:12px;padding:4px;margin-bottom:24px;}
.tab{flex:1;padding:9px;text-align:center;border-radius:9px;cursor:pointer;font-size:13px;font-weight:600;transition:0.3s;color:rgba(255,255,255,0.6);}
.tab.active{background:rgba(255,255,255,0.18);color:white;}
.form-section{display:none;}
.form-section.active{display:block;animation:fadeIn 0.3s ease;}
@keyframes fadeIn{from{opacity:0;transform:translateY(8px);}to{opacity:1;transform:translateY(0);}}
.inp-wrap{position:relative;margin-bottom:14px;}
.inp{
  width:100%;padding:12px 16px;padding-right:44px;
  background:rgba(255,255,255,0.15);border:1.5px solid rgba(255,255,255,0.25);
  border-radius:11px;color:white;font-size:14px;font-family:'Poppins',sans-serif;
  outline:none;transition:0.2s;
}
.inp::placeholder{color:rgba(255,255,255,0.45);}
.inp:focus{border-color:rgba(255,255,255,0.6);background:rgba(255,255,255,0.2);}
.inp.err{border-color:#f87171;animation:shake .3s;}
@keyframes shake{0%,100%{transform:translateX(0);}25%{transform:translateX(-5px);}75%{transform:translateX(5px);}}
.eye{position:absolute;right:14px;top:50%;transform:translateY(-50%);cursor:pointer;font-size:16px;}
.btn{
  width:100%;padding:13px;border:none;border-radius:12px;
  background:linear-gradient(135deg,#6366f1,#8b5cf6);
  color:white;font-size:15px;font-weight:700;cursor:pointer;
  font-family:'Poppins',sans-serif;transition:0.3s;margin-top:4px;
}
.btn:hover{transform:translateY(-2px);box-shadow:0 8px 24px rgba(99,102,241,0.4);}
.forgot-link{text-align:right;font-size:12px;color:rgba(255,255,255,0.6);cursor:pointer;margin-bottom:14px;text-decoration:underline;}
.forgot-link:hover{color:white;}
.err-msg{color:#fca5a5;font-size:12px;text-align:center;margin-top:8px;display:none;}
.success-msg{color:#86efac;font-size:12px;text-align:center;margin-top:8px;display:none;}
.loading-overlay{position:absolute;inset:0;background:rgba(0,0,0,0.3);backdrop-filter:blur(4px);border-radius:24px;display:none;align-items:center;justify-content:center;flex-direction:column;gap:12px;color:white;z-index:5;}
.spinner{width:36px;height:36px;border:3px solid rgba(255,255,255,0.2);border-top-color:white;border-radius:50%;animation:spin 0.8s linear infinite;}
@keyframes spin{to{transform:rotate(360deg);}}
.modal-bg{position:fixed;inset:0;background:rgba(0,0,0,0.6);z-index:200;display:none;align-items:center;justify-content:center;backdrop-filter:blur(6px);}
.modal-bg.open{display:flex;}
.modal{background:#1e1b4b;border-radius:20px;padding:30px;width:320px;color:white;text-align:center;box-shadow:0 20px 60px rgba(0,0,0,0.4);animation:up 0.3s ease;}
.modal h3{font-size:18px;font-weight:700;margin-bottom:8px;}
.modal p{font-size:13px;color:rgba(255,255,255,0.6);margin-bottom:20px;}
.otp-boxes{display:flex;gap:10px;justify-content:center;margin-bottom:16px;}
.otp-box{width:44px;height:52px;border-radius:10px;text-align:center;font-size:22px;font-weight:700;border:2px solid rgba(255,255,255,0.2);background:rgba(255,255,255,0.1);color:white;outline:none;font-family:'Poppins',sans-serif;transition:0.2s;}
.otp-box:focus{border-color:#a5b4fc;}
.otp-timer{font-size:12px;color:rgba(255,255,255,0.5);margin-bottom:12px;}
</style>
</head>
<body>
<canvas id="c"></canvas>
<div class="modal-bg" id="otpModal">
  <div class="modal">
    <h3>🔐 OTP Verification</h3>
    <p id="otpDesc">Enter the 6-digit OTP</p>
    <div class="otp-boxes" id="otpBoxes">
      <input class="otp-box" maxlength="1">
      <input class="otp-box" maxlength="1">
      <input class="otp-box" maxlength="1">
      <input class="otp-box" maxlength="1">
      <input class="otp-box" maxlength="1">
      <input class="otp-box" maxlength="1">
    </div>
    <div class="otp-timer" id="otpTimer">Resend in 60s</div>
    <button class="btn" onclick="verifyOTP()" style="margin-bottom:10px;">✅ Verify OTP</button>
    <button onclick="closeOTPModal()" style="background:none;border:none;color:rgba(255,255,255,0.5);cursor:pointer;font-size:13px;font-family:Poppins;">Cancel</button>
    <p style="color:#fca5a5;font-size:12px;margin-top:8px;display:none;" id="otpErr"></p>
  </div>
</div>

<div class="card" id="card">
  <div class="loading-overlay" id="loader"><div class="spinner"></div><span style="font-size:14px;">Loading...</span></div>
  <div class="logo">APTIORA</div>
  <div class="subtitle">Online Exam System</div>
  <div class="tabs">
    <div class="tab active" id="tab-student" onclick="switchTab('student')">🎓 Student</div>
    <div class="tab" id="tab-admin" onclick="switchTab('admin')">🔐 Admin</div>
  </div>

  <!-- STUDENT -->
  <div class="form-section active" id="studentForm">
    <div class="inp-wrap">
      <input class="inp" type="text" id="s_reg" placeholder="Register No" autocomplete="off">
    </div>
    <div class="inp-wrap">
      <input class="inp" type="password" id="s_pass" placeholder="Password">
      <span class="eye" onclick="toggleEye('s_pass','s_eye')" id="s_eye">👁</span>
    </div>
    <div class="forgot-link" onclick="openForgot()">Forgot Password?</div>
    <button class="btn" onclick="studentLogin()">Login →</button>
    <p class="err-msg" id="s_err">❌ Invalid Register No or Password</p>
    <p class="success-msg" id="s_ok">✅ Login Successful!</p>
  </div>

  <!-- ADMIN -->
  <div class="form-section" id="adminForm">
    <div class="inp-wrap">
      <input class="inp" type="text" id="a_user" placeholder="Username" autocomplete="off">
    </div>
    <div class="inp-wrap">
      <input class="inp" type="password" id="a_pass" placeholder="Password">
      <span class="eye" onclick="toggleEye('a_pass','a_eye')" id="a_eye">👁</span>
    </div>
    <button class="btn" onclick="adminLogin()">🔐 Admin Login</button>
    <p class="err-msg" id="a_err">❌ Wrong admin credentials</p>
  </div>
</div>

<script>
function getUsers(){
  return JSON.parse(localStorage.getItem("users")) || {
    "714524205005":{name:"Balaji",password:"1234",dept:"IT",batch:"2024-2028",email:""},
    "714524205053":{name:"Vicky",password:"1234",dept:"IT",batch:"2024-2028",email:""},
    "714524205027":{name:"Ismail",password:"1234",dept:"IT",batch:"2024-2028",email:""},
    "714524205041":{name:"Sakthivel",password:"1234",dept:"IT",batch:"2024-2028",email:""}
  };
}
function getSettings(){
  return JSON.parse(localStorage.getItem("adminSettings"))||{adminUsername:"admin@balaji",adminPassword:"balaji@123"};
}

function switchTab(tab){
  ["student","admin"].forEach(t=>{
    document.getElementById("tab-"+t).classList.remove("active");
    document.getElementById(t+"Form").classList.remove("active");
  });
  document.getElementById("tab-"+tab).classList.add("active");
  document.getElementById(tab+"Form").classList.add("active");
  clearErrors();
}
function clearErrors(){
  ["s_err","s_ok","a_err"].forEach(id=>document.getElementById(id).style.display="none");
  document.querySelectorAll(".inp").forEach(i=>i.classList.remove("err"));
}
function toggleEye(inputId,eyeId){
  let inp=document.getElementById(inputId),eye=document.getElementById(eyeId);
  if(inp.type==="password"){inp.type="text";eye.textContent="🙈";}
  else{inp.type="password";eye.textContent="👁";}
}
function showLoader(){document.getElementById("loader").style.display="flex";}
function hideLoader(){document.getElementById("loader").style.display="none";}

function studentLogin(){
  clearErrors();
  let reg=document.getElementById("s_reg").value.trim();
  let pass=document.getElementById("s_pass").value.trim();
  if(!reg||!pass){
    document.getElementById("s_err").innerText="Please fill all fields!";
    document.getElementById("s_err").style.display="block";return;
  }
  showLoader();
  let users=getUsers();
  setTimeout(()=>{
    if(users[reg] && users[reg].password===pass){
      localStorage.setItem("username",reg);
      localStorage.setItem("name",users[reg].name);
      logActivity(users[reg].name,"Logged in");
      document.getElementById("s_ok").style.display="block";
      hideLoader();
      setTimeout(()=>location.href="dashboard.html",800);
    } else {
      hideLoader();
      document.getElementById("s_reg").classList.add("err");
      document.getElementById("s_pass").classList.add("err");
      document.getElementById("s_err").style.display="block";
    }
  },1000);
}

function adminLogin(){
  clearErrors();
  let user=document.getElementById("a_user").value.trim();
  let pass=document.getElementById("a_pass").value.trim();
  let s=getSettings();
  let adminUser=s.adminUsername||"admin@balaji";
  let adminPass=s.adminPassword||"balaji@123";
  if(user===adminUser && pass===adminPass){
    localStorage.setItem("adminLoggedIn","yes");
    location.href="admin.html";
  } else {
    document.getElementById("a_user").classList.add("err");
    document.getElementById("a_pass").classList.add("err");
    document.getElementById("a_err").style.display="block";
  }
}

// FORGOT PASSWORD
let forgotReg="";
let otpTimerInterval;
function openForgot(){
  let reg=document.getElementById("s_reg").value.trim();
  if(!reg){
    document.getElementById("s_err").innerText="Enter your Register No first!";
    document.getElementById("s_err").style.display="block";return;
  }
  let users=getUsers();
  if(!users[reg]){
    document.getElementById("s_err").innerText="Register No not found!";
    document.getElementById("s_err").style.display="block";return;
  }
  forgotReg=reg;
  let otp=Math.floor(100000+Math.random()*900000).toString();
  localStorage.setItem("resetOTP_"+reg,otp);
  localStorage.setItem("resetOTP_expiry",Date.now()+5*60000);
  // Show OTP in alert for demo (replace with email in production)
  alert("Demo OTP: "+otp+" (In production, this goes to student email)");
  openOTPModal();
}
function openOTPModal(){
  document.getElementById("otpModal").classList.add("open");
  document.querySelectorAll(".otp-box").forEach((b,i)=>{
    b.value="";
    b.oninput=()=>{if(b.value&&i<5)document.querySelectorAll(".otp-box")[i+1].focus();};
    b.onkeydown=e=>{if(e.key==="Backspace"&&!b.value&&i>0)document.querySelectorAll(".otp-box")[i-1].focus();};
  });
  document.querySelectorAll(".otp-box")[0].focus();
  startOTPTimer(60);
}
function closeOTPModal(){
  document.getElementById("otpModal").classList.remove("open");
  clearInterval(otpTimerInterval);
}
function startOTPTimer(sec){
  clearInterval(otpTimerInterval);
  let t=sec;
  otpTimerInterval=setInterval(()=>{
    document.getElementById("otpTimer").innerText=t>0?`Resend in ${t}s`:"OTP expired";
    t--;if(t<0)clearInterval(otpTimerInterval);
  },1000);
}
function verifyOTP(){
  let entered=[...document.querySelectorAll(".otp-box")].map(b=>b.value).join("");
  let stored=localStorage.getItem("resetOTP_"+forgotReg);
  let expiry=parseInt(localStorage.getItem("resetOTP_expiry")||0);
  let errEl=document.getElementById("otpErr");
  if(Date.now()>expiry){errEl.innerText="OTP expired!";errEl.style.display="block";return;}
  if(entered===stored){
    closeOTPModal();
    let newPass=prompt("✅ OTP Verified!\nEnter your new password:");
    if(newPass&&newPass.trim()){
      let users=getUsers();
      users[forgotReg].password=newPass.trim();
      localStorage.setItem("users",JSON.stringify(users));
      alert("✅ Password reset successfully! Please login.");
    }
  } else {
    errEl.innerText="Wrong OTP! Try again.";
    errEl.style.display="block";
  }
}

function logActivity(name,action){
  let logs=JSON.parse(localStorage.getItem("activityLog"))||[];
  logs.unshift({msg:`${name} — ${action}`,color:"#22c55e",time:new Date().toLocaleString()});
  if(logs.length>100)logs=logs.slice(0,100);
  localStorage.setItem("activityLog",JSON.stringify(logs));
}

document.addEventListener("keydown",e=>{
  if(e.key==="Enter"){
    if(document.getElementById("studentForm").classList.contains("active")) studentLogin();
    else adminLogin();
  }
});

// Particles
const cv=document.getElementById("c"),ctx=cv.getContext("2d");
let W=cv.width=innerWidth,H=cv.height=innerHeight;
let P=Array.from({length:60},()=>({x:Math.random()*W,y:Math.random()*H,r:Math.random()*3,dx:(Math.random()-.5)*.5,dy:(Math.random()-.5)*.5}));
function draw(){
  ctx.clearRect(0,0,W,H);
  P.forEach(p=>{p.x+=p.dx;p.y+=p.dy;if(p.x<0||p.x>W)p.dx*=-1;if(p.y<0||p.y>H)p.dy*=-1;
    ctx.beginPath();ctx.arc(p.x,p.y,p.r,0,Math.PI*2);ctx.fillStyle="rgba(255,255,255,.6)";ctx.fill();});
  for(let i=0;i<P.length;i++)for(let j=i+1;j<P.length;j++){
    let d=Math.hypot(P[i].x-P[j].x,P[i].y-P[j].y);
    if(d<110){ctx.beginPath();ctx.strokeStyle=`rgba(255,255,255,${(1-d/110)*.2})`;ctx.moveTo(P[i].x,P[i].y);ctx.lineTo(P[j].x,P[j].y);ctx.stroke();}
  }
  requestAnimationFrame(draw);
}
draw();
addEventListener("resize",()=>{W=cv.width=innerWidth;H=cv.height=innerHeight;});
</script>
</body>
</html>
